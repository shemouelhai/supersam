worker_processes 1;

events {
  worker_connections 1024;
}

http {
  include mime.types;
  default_type application/octet-stream;
  sendfile on;
  keepalive_timeout 65;

  server {
    listen 8080;
    server_name localhost;
    root /home/supersam;

    location / {
      default_type text/html;
      content_by_lua_file /home/supersam/supersam.lua;
    }

    location /static/ {
      alias /home/supersam/static/;
    }
  }
}
